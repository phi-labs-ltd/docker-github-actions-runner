name: Build and Push Ubuntu Jammy to Docker Hub
on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_and_push_base:
    runs-on: ubuntu-latest
    env:
      ORG: ${{ vars.DOCKER_ORG || github.repository_owner }}
    steps:
      - name: Copy Repo Files
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4
        with:
          image: tonistiigi/binfmt:qemu-v7.0.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
      - name: Rewrite Dockerfile.base FROM to ubuntu:jammy
        run: sed -i.bak 's|^FROM.*|FROM ubuntu:jammy|' Dockerfile.base
      - name: Login to DockerHub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Retry build and push base
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4
        with:
          timeout_minutes: 60
          max_attempts: 3
          command: |
            docker buildx build \
              --file Dockerfile.base \
              --platform linux/amd64,linux/arm64 \
              --tag ${ORG}/github-runner-base:ubuntu-jammy \
              --tag ${ORG}/github-runner-base:latest \
              --push \
              --pull \
              --cache-from type=gha \
              --cache-to type=gha,mode=max \
              .

  build_and_push_runner:
    runs-on: ubuntu-latest
    needs: build_and_push_base
    env:
      ORG: ${{ vars.DOCKER_ORG || github.repository_owner }}
    steps:
      - name: Copy Repo Files
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4
        with:
          image: tonistiigi/binfmt:qemu-v7.0.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
      - name: Rewrite Dockerfile FROM to use our ubuntu-jammy base
        run: sed -i.bak "s|^FROM.*|FROM ${ORG}/github-runner-base:ubuntu-jammy|" Dockerfile
      - name: Login to DockerHub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Retry build and push runner
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4
        with:
          timeout_minutes: 60
          max_attempts: 3
          command: |
            docker buildx build \
              --file Dockerfile \
              --platform linux/amd64,linux/arm64 \
              --tag ${ORG}/github-runner:ubuntu-jammy \
              --tag ${ORG}/github-runner:latest \
              --push \
              --pull \
              --cache-from type=gha \
              --cache-to type=gha,mode=max \
              .
